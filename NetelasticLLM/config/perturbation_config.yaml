# Perturbation Configuration

# Atomic Perturbation Operators
atomic_operators:
  # Direction control
  direction:
    enabled: true
    flip_probability: 0.3
    
  # Length modulation
  length:
    enabled: true
    padding_range: [0, 1500]  # bytes
    fragmentation_min_size: 64
    
  # Timing adjustment
  timing:
    enabled: true
    delay_range: [0, 100]  # milliseconds
    max_cumulative_delay: 1000  # milliseconds

# Feasibility Constraints
constraints:
  # Temporal causality
  temporal:
    enforce_nonnegative_gaps: true
    enforce_monotonic_timestamps: true
    
  # Traffic budgets
  budget:
    max_total_bytes: 1048576  # 1 MB
    max_total_duration: 60000  # 60 seconds (in ms)
    
  # Protocol realism
  protocol:
    min_run_length: 2  # minimum consecutive packets in same direction
    max_alternation_ratio: 0.8  # max ratio of direction changes
    
  # Packet count
  packet_count:
    min_packets: 2
    max_packets: 1000

# Genome Encoding
genome:
  # Variable-length representation: g = (d, l, δ)
  representation: "triplet_sequence"
  
  # Bounds for each component
  direction_values: [-1, 1]  # client-to-server, server-to-client
  length_bounds: [64, 1500]  # packet size in bytes
  timing_bounds: [0, 1000]   # inter-arrival time in ms
  
  # Sequence length adaptability
  variable_length: true
  min_sequence_length: 2
  max_sequence_length: 256

# Mutation Operators
mutation:
  # Direction flip
  direction_flip:
    probability: 0.2
    segment_length_range: [1, 5]
    
  # Count jitter (insert/delete packets)
  count_jitter:
    probability: 0.15
    insert_probability: 0.5  # vs delete
    
  # Length scaling
  length_scaling:
    probability: 0.25
    scale_range: [0.8, 1.2]
    segment_length_range: [1, 10]
    
  # Interval modulation
  interval_modulation:
    probability: 0.25
    dilation_range: [0.5, 2.0]
    segment_length_range: [1, 10]
    
  # Burst swap
  burst_swap:
    probability: 0.15
    segment_length_range: [3, 8]

# Crossover Operators
crossover:
  # Single-point crossover
  single_point:
    enabled: true
    probability: 0.6
    
  # Two-point crossover
  two_point:
    enabled: true
    probability: 0.3
    
  # Uniform crossover
  uniform:
    enabled: false
    probability: 0.1

# Elasticity Energy Computation
elasticity:
  # Proxy gradient from pretrained model
  proxy_gradient:
    use_pretrained_model: true
    compute_second_order: true  # compute Hessian approximation
    
  # Energy metric weights
  energy_weights:
    alignment_weight: 1.0
    curvature_weight: 0.5
    
  # Dominant rebound direction
  rebound_direction:
    # Normalize direction vector
    normalize: true
    # Use top-k principal components
    use_pca: false
    top_k_components: 10

# Population Initialization
initialization:
  # Heuristic strategy composition
  strategy:
    high_frequency_ratio: 0.4
    structural_anchors_ratio: 0.3
    energy_guided_ratio: 0.3
    
  # High-frequency seeds
  high_frequency:
    kernel_bandwidth: "scott"  # or specific value
    top_k: 100
    
  # Structural anchors
  structural_anchors:
    # Discretization bins for each dimension
    num_bins_per_dimension: 10
    stratified_samples_per_bin: 5
    
  # Energy-guided candidates
  energy_guided:
    sample_size: 1000
    top_k: 100

# Fitness Function
fitness:
  # Composite fitness: Φ(u) = w₁E(φ(u)) + w₂R_sur(u) - λ_b p_b(u) - λ_p p_p(u)
  weights:
    elastic_energy: 1.0        # w₁
    surrogate_uncertainty: 0.5  # w₂
    
  penalties:
    coarse_fidelity: 10.0      # λ_b
    physical_feasibility: 10.0  # λ_p
    
  # Surrogate uncertainty metric
  surrogate_uncertainty:
    metric: "entropy"  # entropy, variance, or prediction_gap

# Dual-Layer Evolution Parameters
evolution:
  # Layer I: Submodular Coverage
  submodular:
    # Number of prototypes to select
    num_prototypes: 50
    
    # Similarity metric
    similarity:
      metric: "rbf"  # rbf, cosine, or euclidean
      bandwidth: "median"  # median pairwise distance
      
    # Greedy selection
    approximation_ratio: 0.63  # 1 - 1/e
    
  # Layer II: Constrained Genetic Algorithm
  genetic_algorithm:
    # Population parameters
    mu: 30  # elite individuals to retain
    lambda: 60  # offspring to generate
    
    # Evolution parameters
    max_generations: 100
    early_stopping_patience: 10
    
    # Successive halving
    successive_halving:
      enabled: true
      halving_rate: 0.5
      min_candidates: 10
      
    # Selection strategy
    selection:
      type: "tournament"  # tournament, roulette, or rank
      tournament_size: 3
      elitism: true
      elite_size: 5

# Search Termination
termination:
  # Convergence criteria
  max_iterations: 200
  fitness_threshold: 0.95
  
  # Stagnation detection
  stagnation:
    window_size: 20
    min_improvement: 1.0e-4
    
  # Budget constraints
  max_evaluations: 10000
  max_time_seconds: 3600

# Perturbation Set Construction
perturbation_set:
  # Minimal set objective
  target_set_size: 100
  
  # Rebound distance threshold
  kl_divergence_threshold: 0.1
  
  # Aggregation strategy
  aggregation: "union"  # union or best_per_prototype
